<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 อิอ้วนนนน</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Mitr:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f0720; --card:#1e0f3a; --border:#3d1f6e;
    --pink:#ff6eb4; --purple:#c084fc; --lavender:#d4a8ff;
    --text:#f0e6ff; --muted:#9d7ec9;
  }
  html,body { min-height:100vh; background:var(--bg); font-family:'Sarabun',sans-serif; color:var(--text); overflow-x:hidden; }
  #stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d) var(--delay) infinite ease-in-out alternate; }
  @keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.9;transform:scale(1.2)} }
  #app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 16px; }
  .site-title { font-family:'Mitr',sans-serif; font-size:clamp(1.4rem,5vw,2rem); font-weight:500; color:var(--pink); letter-spacing:.05em; margin-bottom:8px; text-align:center; }
  .site-sub { font-size:.85rem; color:var(--muted); margin-bottom:32px; text-align:center; }
  #progress-wrap { width:100%; max-width:460px; height:4px; background:var(--border); border-radius:99px; margin-bottom:28px; overflow:hidden; }
  #progress-bar { height:100%; background:linear-gradient(90deg,var(--pink),var(--purple)); border-radius:99px; transition:width .5s ease; width:0%; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:36px 28px; width:100%; max-width:460px; box-shadow:0 0 40px #ff6eb422,0 8px 32px #00000044; position:relative; animation:slideUp .45s cubic-bezier(.22,1,.36,1); }
  @keyframes slideUp { from{opacity:0;transform:translateY(28px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  .q-number { font-size:.75rem; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-bottom:12px; }
  .q-text { font-family:'Mitr',sans-serif; font-size:clamp(1.05rem,4vw,1.3rem); font-weight:400; line-height:1.65; color:var(--lavender); margin-bottom:28px; min-height:80px; }
  .q-emoji { display:block; font-size:2.4rem; margin-bottom:12px; }
  .choices { display:flex; flex-direction:column; gap:12px; }
  .choice-btn { background:transparent; border:1.5px solid var(--border); border-radius:14px; padding:14px 20px; color:var(--text); font-family:'Sarabun',sans-serif; font-size:1rem; cursor:pointer; text-align:left; transition:all .2s ease; position:relative; overflow:hidden; }
  .choice-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,#ff6eb422,#c084fc11); opacity:0; transition:opacity .2s; }
  .choice-btn:hover::before { opacity:1; }
  .choice-btn:hover { border-color:var(--pink); transform:translateX(4px); box-shadow:0 0 16px #ff6eb433; }
  .choice-btn.selected { border-color:var(--purple); background:linear-gradient(135deg,#2d1157,#1e0f3a); }
  .choice-btn.correct { border-color:#4ade80; background:#052e1655; color:#86efac; }
  .choice-btn.wrong { border-color:#f87171; background:#2d050555; color:#fca5a5; text-decoration:line-through; }
  .yesno { display:flex; gap:12px; margin-top:4px; }
  .btn-yes,.btn-no { flex:1; padding:14px; border:none; border-radius:14px; font-family:'Mitr',sans-serif; font-size:1rem; font-weight:400; cursor:pointer; transition:all .2s ease; }
  .btn-yes { background:var(--pink); color:#fff; box-shadow:0 4px 16px #ff6eb455; }
  .btn-yes:hover { background:#ff88c4; transform:translateY(-2px); }
  .btn-no { background:#3d1f6e; color:var(--lavender); border:1.5px solid var(--border); }
  .btn-no:hover { border-color:var(--purple); transform:translateY(-2px); }
  /* text answer */
  .text-area-wrap { display:flex; flex-direction:column; gap:10px; }
  .text-input { background:#150930; border:1.5px solid var(--border); border-radius:14px; padding:14px 16px; color:var(--text); font-family:'Sarabun',sans-serif; font-size:1rem; resize:vertical; min-height:90px; outline:none; transition:border-color .2s; }
  .text-input:focus { border-color:var(--purple); }
  .btn-submit-text { padding:13px; background:linear-gradient(135deg,var(--pink),var(--purple)); border:none; border-radius:14px; color:#fff; font-family:'Mitr',sans-serif; font-size:1rem; cursor:pointer; transition:all .2s; }
  .btn-submit-text:hover { transform:translateY(-2px); box-shadow:0 4px 16px #c084fc44; }
  #next-btn { margin-top:20px; width:100%; padding:14px; background:linear-gradient(135deg,var(--pink),var(--purple)); border:none; border-radius:14px; color:#fff; font-family:'Mitr',sans-serif; font-size:1rem; font-weight:400; cursor:pointer; display:none; transition:all .2s ease; box-shadow:0 4px 20px #c084fc44; }
  #next-btn:hover { transform:translateY(-2px); }
  #next-btn.show { display:block; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  #result-screen { display:none; text-align:center; }
  #result-screen.show { display:block; animation:slideUp .5s ease; }
  .result-emoji { font-size:4rem; margin-bottom:16px; }
  .result-title { font-family:'Mitr',sans-serif; font-size:clamp(1.5rem,6vw,2.2rem); font-weight:500; color:var(--pink); margin-bottom:12px; }
  .result-desc { font-size:1rem; color:var(--lavender); line-height:1.8; margin-bottom:28px; }
  .score-badge { display:inline-block; background:linear-gradient(135deg,var(--pink),var(--purple)); color:#fff; font-family:'Mitr',sans-serif; font-size:1.1rem; padding:10px 28px; border-radius:99px; margin-bottom:28px; box-shadow:0 4px 16px #ff6eb444; }
  #restart-btn { padding:13px 36px; background:transparent; border:1.5px solid var(--pink); border-radius:14px; color:var(--pink); font-family:'Sarabun',sans-serif; font-size:1rem; cursor:pointer; transition:all .2s; }
  #restart-btn:hover { background:#ff6eb422; transform:translateY(-2px); }
  .heart-particle { position:fixed; font-size:1.5rem; pointer-events:none; z-index:999; animation:floatUp 1.2s ease forwards; }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)} 100%{opacity:0;transform:translateY(-180px) scale(.5) rotate(20deg)} }
  #feedback { margin-top:14px; padding:12px 16px; border-radius:12px; font-size:.92rem; line-height:1.6; display:none; animation:fadeIn .3s ease; }
  #feedback.correct { background:#052e1655; border:1px solid #4ade8055; color:#86efac; display:block; }
  #feedback.wrong   { background:#2d050555; border:1px solid #f8717155; color:#fca5a5; display:block; }
  #feedback.info    { background:#1e0f3a;   border:1px solid var(--border); color:var(--lavender); display:block; }
  .admin-link { position:fixed; bottom:16px; right:16px; z-index:10; font-size:.75rem; color:var(--border); text-decoration:none; transition:color .2s; }
  .admin-link:hover { color:var(--muted); }
  /* empty state */
  .empty-state { text-align:center; padding:20px 0; color:var(--muted); font-size:.95rem; line-height:2; }
</style>
</head>
<body>
<div id="stars"></div>
<div id="app">
  <h1 class="site-title">💕 อิอ้วน</h1>
  <p class="site-sub">อิอ้วนนนนน~</p>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="quiz-area">
    <div class="card" id="question-card">
      <div class="q-number" id="q-number">คำถามที่ 1 / ?</div>
      <div class="q-text"><span class="q-emoji" id="q-emoji">💭</span><span id="q-body">กำลังโหลด...</span></div>
      <div id="answer-area"></div>
      <div id="feedback"></div>
      <button id="next-btn" onclick="nextQuestion()">ถัดไป →</button>
    </div>
    <div class="card" id="result-screen">
      <div class="result-emoji" id="res-emoji">💕</div>
      <div class="result-title" id="res-title">ผลลัพธ์</div>
      <div class="score-badge" id="res-score"></div>
      <div class="result-desc" id="res-desc"></div>
      <button id="restart-btn" onclick="restart()">🔄 เล่นอีกครั้ง</button>
    </div>
  </div>
</div>
<a href="admin.html" class="admin-link">⚙ แอดมิน</a>

<script>
let questions = [];
let current = 0, score = 0, answered = false;

// ── Load questions from server API ──
async function loadQuestions() {
  try {
    const res = await fetch('/api/questions');
    if (!res.ok) throw new Error('fetch failed');
    const arr = await res.json();
    if (Array.isArray(arr)) return arr;
  } catch(e) {
    console.warn('โหลดคำถามไม่ได้:', e);
  }
  return [];
}

// Stars
(function(){
  const w = document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*2+1.5).toFixed(1)}s;--delay:-${(Math.random()*3).toFixed(1)}s;`;
    w.appendChild(s);
  }
})();

function render() {
  if (!questions.length) {
    document.getElementById('question-card').innerHTML = `<div class="empty-state">😢 ยังไม่มีคำถาม<br>แอดมินเพิ่มคำถามก่อนนะ~<br><a href="admin.html" style="color:var(--pink)">→ ไปหน้าแอดมิน</a></div>`;
    return;
  }
  const q = questions[current];
  answered = false;
  document.getElementById('q-number').textContent = `คำถามที่ ${current+1} / ${questions.length}`;
  document.getElementById('q-emoji').textContent = q.emoji || '💭';
  document.getElementById('q-body').textContent = q.text;
  const fb = document.getElementById('feedback');
  fb.className=''; fb.textContent='';
  document.getElementById('next-btn').className='';
  document.getElementById('progress-bar').style.width = `${(current/questions.length)*100}%`;
  const card = document.getElementById('question-card');
  card.style.animation='none'; requestAnimationFrame(()=>{ card.style.animation=''; });
  const area = document.getElementById('answer-area');
  area.innerHTML='';

  if (q.type==='yesno') {
    area.innerHTML=`<div class="yesno"><button class="btn-yes" onclick="answerYesNo('yes')">✅ ใช่เลย!</button><button class="btn-no" onclick="answerYesNo('no')">❌ ไม่นะ</button></div>`;
  } else if (q.type==='choice') {
    const choices = q.choices || [];
    area.innerHTML=`<div class="choices">${choices.map((c,i)=>`<button class="choice-btn" onclick="answerChoice(${i})">${c}</button>`).join('')}</div>`;
  } else if (q.type==='text') {
    area.innerHTML=`<div class="text-area-wrap"><textarea class="text-input" id="text-ans" placeholder="พิมพ์คำตอบของคุณที่นี่..."></textarea><button class="btn-submit-text" onclick="answerText()">ส่งคำตอบ 💌</button></div>`;
  }
}

function answerYesNo(val) {
  if(answered) return; answered=true;
  const q=questions[current], fb=document.getElementById('feedback');
  if(q.correct===val){ score++; spawnHearts(); }
  const msg=typeof q.feedback==='object' ? q.feedback[val] : q.feedback;
  const ok=q.correct===null ? null : (q.correct===val);
  fb.className=ok===null?'info':(ok?'correct':'wrong');
  fb.textContent=msg||'';
  document.querySelectorAll('.btn-yes,.btn-no').forEach(b=>b.style.opacity='.5');
  document.getElementById('next-btn').className='show';
}

function answerChoice(idx) {
  if(answered) return; answered=true;
  const q=questions[current], btns=document.querySelectorAll('.choice-btn'), fb=document.getElementById('feedback');
  btns[idx].classList.add('selected');
  btns.forEach(b=>b.style.pointerEvents='none');
  if(q.correct===null||q.correct===undefined){
    score++; spawnHearts(); fb.className='info'; fb.textContent=q.feedback||'';
  } else {
    if(idx===q.correct){ btns[idx].classList.add('correct'); score++; spawnHearts(); fb.className='correct'; }
    else { btns[idx].classList.add('wrong'); if(btns[q.correct]) btns[q.correct].classList.add('correct'); fb.className='wrong'; }
    fb.textContent=q.feedback||'';
  }
  document.getElementById('next-btn').className='show';
}

function answerText() {
  if(answered) return;
  const val=document.getElementById('text-ans').value.trim();
  if(!val) return;
  answered=true; score++;
  const q=questions[current], fb=document.getElementById('feedback');
  fb.className='info'; fb.textContent=(q.feedback||'ขอบคุณที่ตอบนะ 🥰');
  document.querySelector('.btn-submit-text').disabled=true;
  document.getElementById('text-ans').disabled=true;
  spawnHearts();
  document.getElementById('next-btn').className='show';
}

function nextQuestion() {
  current++;
  if(current>=questions.length) showResult();
  else render();
}

function showResult() {
  document.getElementById('question-card').style.display='none';
  document.getElementById('progress-bar').style.width='100%';
  const pct=score/questions.length;
  let emoji,title,desc;
  if(pct>=.9){ emoji='💍'; title='อิอ้วนนนน!'; desc='💕'; }
  else if(pct>=.7){ emoji='💝'; title='อิอ้วนนน'; desc='🌸'; }
  else if(pct>=.5){ emoji='💫'; title='อิอ้วนน'; desc='💬'; }
  else { emoji='🌱'; title='อิอ้วน'; desc='🌷'; }
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-score').textContent=`${score} / ${questions.length} คะแนน`;
  document.getElementById('res-desc').textContent=desc;
  document.getElementById('result-screen').className='card show';
  for(let i=0;i<12;i++) setTimeout(()=>spawnHearts(true),i*120);
}

async function restart() {
  questions = await loadQuestions(); current=0; score=0; answered=false;
  document.getElementById('result-screen').className='card';
  document.getElementById('question-card').style.display='';
  render();
}

function spawnHearts(burst=false) {
  const emojis=['💕','💖','💗','💓','💞','🌸','✨'];
  for(let i=0;i<(burst?3:2);i++){
    const el=document.createElement('div'); el.className='heart-particle';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=(20+Math.random()*60)+'vw'; el.style.bottom='15vh';
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

// ── Init ──
(async () => {
  questions = await loadQuestions();
  render();
})();
</script>
</body>
</html>
